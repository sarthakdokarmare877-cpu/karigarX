<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MetalCraft AI — Custom Metal Furniture Design</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f5f2ec; --bg2:#eeeae1; --bg3:#e8e3d8;
    --surface:#ffffff; --surface2:#f0ede6;
    --border:rgba(132,140,103,0.15); --border2:rgba(132,140,103,0.28);
    --text:#2c3320; --text2:#5c6249; --text3:#9ba186;
    --accent:#848c67; --accent2:#9ba186; --accent3:#5c6249;
    --gold:#b89a5a; --danger:#c0614a;
    --glow:rgba(132,140,103,0.25); --glow2:rgba(155,161,134,0.18);
    --dun:#c5bea9; --bone:#e1dbca; --sage:#9ba186; --reseda:#848c67; --ebony:#5c6249;
  }
  html { scroll-behavior: smooth; }
  body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; font-size:16px; line-height:1.6; min-height:100vh; overflow-x:hidden; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg2); }
  ::-webkit-scrollbar-thumb { background:var(--reseda); border-radius:3px; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-10px)} }
  @keyframes glow-pulse { 0%,100%{box-shadow:0 0 20px var(--glow)} 50%{box-shadow:0 0 40px var(--glow),0 0 80px var(--glow2)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes rotate3d { from{transform:rotateY(0deg)} to{transform:rotateY(360deg)} }
  .animate-fadeUp{animation:fadeUp 0.6s ease forwards}
  .animate-fadeIn{animation:fadeIn 0.4s ease forwards}
  .animate-float{animation:float 4s ease-in-out infinite}
  .animate-spin{animation:spin 1s linear infinite}
  .animate-pulse{animation:pulse 2s ease infinite}
  .animate-glow{animation:glow-pulse 3s ease infinite}
  .stagger-1{animation-delay:0.1s;opacity:0;animation-fill-mode:forwards}
  .stagger-2{animation-delay:0.2s;opacity:0;animation-fill-mode:forwards}
  .stagger-3{animation-delay:0.3s;opacity:0;animation-fill-mode:forwards}
  .stagger-4{animation-delay:0.4s;opacity:0;animation-fill-mode:forwards}
  .stagger-5{animation-delay:0.5s;opacity:0;animation-fill-mode:forwards}
  .stagger-6{animation-delay:0.6s;opacity:0;animation-fill-mode:forwards}
  .container{max-width:1200px;margin:0 auto;padding:0 24px}
  .section{padding:80px 0}
  .glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:20px;box-shadow:0 4px 24px rgba(92,98,73,0.08)}
  .gradient-text{background:linear-gradient(135deg,#5c6249,#848c67,#9ba186);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .gradient-text-gold{background:linear-gradient(135deg,#b89a5a,#d4b87a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .btn-primary{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;background:linear-gradient(135deg,#5c6249,#848c67);color:#f5f2ec;border:none;border-radius:14px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s ease;box-shadow:0 8px 28px rgba(92,98,73,0.30);text-decoration:none;letter-spacing:0.01em}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(92,98,73,0.38);background:linear-gradient(135deg,#6b7357,#959f77)}
  .btn-primary:active{transform:translateY(0)}
  .btn-secondary{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:var(--surface);color:var(--text2);border:1.5px solid var(--border2);border-radius:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.3s ease;box-shadow:0 2px 8px rgba(92,98,73,0.08)}
  .btn-secondary:hover{background:var(--bone);border-color:var(--reseda);color:var(--ebony);box-shadow:0 4px 16px rgba(92,98,73,0.14)}
  .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:transparent;color:var(--text2);border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s}
  .btn-ghost:hover{color:var(--ebony);background:var(--surface2)}
  .input-field{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;transition:border-color 0.2s,box-shadow 0.2s;outline:none;box-shadow:0 1px 4px rgba(92,98,73,0.06)}
  .input-field:focus{border-color:var(--reseda);box-shadow:0 0 0 3px rgba(132,140,103,0.18)}
  .input-field::placeholder{color:var(--text3)}
  .label{display:block;font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:24px;transition:all 0.3s ease;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(92,98,73,0.07)}
  .card::before{content:'';position:absolute;inset:0;border-radius:20px;padding:1.5px;background:linear-gradient(135deg,transparent,rgba(132,140,103,0.4),transparent);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity 0.3s}
  .card:hover::before{opacity:1}
  .card:hover{border-color:rgba(132,140,103,0.5);transform:translateY(-4px);box-shadow:0 20px 48px rgba(92,98,73,0.16),0 0 0 1px rgba(132,140,103,0.25)}
  .card.selected{border-color:var(--reseda);background:rgba(132,140,103,0.06);box-shadow:0 0 0 2px var(--reseda),0 16px 48px rgba(132,140,103,0.20)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
  .badge-purple{background:rgba(132,140,103,0.12);color:#5c6249;border:1px solid rgba(132,140,103,0.30)}
  .badge-blue{background:rgba(155,161,134,0.15);color:#848c67;border:1px solid rgba(155,161,134,0.32)}
  .badge-green{background:rgba(92,98,73,0.10);color:#3d4232;border:1px solid rgba(92,98,73,0.25)}
  .badge-gold{background:rgba(184,154,90,0.12);color:#9a7a38;border:1px solid rgba(184,154,90,0.28)}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--ebony),var(--reseda));border-radius:2px;transition:width 0.5s ease}
  .toast{position:fixed;bottom:30px;right:30px;z-index:9999;background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:16px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 20px 60px rgba(92,98,73,0.20);animation:slideIn 0.3s ease forwards;max-width:380px}
  .toast.success{border-color:rgba(92,98,73,0.45)}
  .toast.error{border-color:rgba(192,97,74,0.45)}
  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--dun),transparent);margin:24px 0}
  .chip{padding:8px 18px;border-radius:30px;border:1.5px solid var(--border2);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;background:var(--surface);color:var(--text2);box-shadow:0 1px 4px rgba(92,98,73,0.06)}
  .chip:hover{border-color:var(--reseda);color:var(--ebony);background:rgba(132,140,103,0.08)}
  .chip.active{border-color:var(--reseda);color:var(--ebony);background:rgba(132,140,103,0.14);font-weight:600}
  .navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 0;background:rgba(245,242,236,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);box-shadow:0 2px 16px rgba(92,98,73,0.07)}
  .hero-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  .hero-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  .grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
  @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}.grid-auto{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}.hide-mobile{display:none}}
  @media(max-width:480px){.grid-2,.grid-4{grid-template-columns:1fr}}
  .nest-grid{display:grid;gap:3px;padding:16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
  .nest-cell{aspect-ratio:1;border-radius:4px;border:1px solid rgba(132,140,103,0.25)}
  .nest-cell.filled{background:linear-gradient(135deg,var(--reseda),var(--sage))}
  .nest-cell.empty{background:rgba(192,97,74,0.08);border-color:rgba(192,97,74,0.18)}
  .spinner{width:48px;height:48px;border:3px solid var(--surface2);border-top-color:var(--reseda);border-radius:50%;animation:spin 0.8s linear infinite}
  .toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 4px rgba(92,98,73,0.05)}
  .toggle-wrap:hover{border-color:var(--border2);background:var(--bg2)}
  .toggle-wrap.on{border-color:rgba(92,98,73,0.45);background:rgba(132,140,103,0.06)}
  .toggle{width:40px;height:22px;background:var(--dun);border-radius:11px;position:relative;transition:background 0.2s;flex-shrink:0}
  .toggle.on{background:var(--reseda)}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:white;border-radius:50%;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
  .toggle.on::after{transform:translateX(18px)}
  .step-dot{width:10px;height:10px;border-radius:50%;background:var(--bone);border:2px solid var(--dun);transition:all 0.3s}
  .step-dot.active{background:var(--reseda);border-color:var(--reseda);box-shadow:0 0 10px var(--glow);transform:scale(1.3)}
  .step-dot.done{background:var(--ebony);border-color:var(--ebony)}
  .color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.2s;position:relative;box-shadow:0 2px 8px rgba(92,98,73,0.15)}
  .color-swatch.selected{border-color:var(--ebony);transform:scale(1.2);box-shadow:0 0 0 2px var(--reseda),0 4px 12px rgba(92,98,73,0.25)}
  .stat-item{text-align:center;padding:20px}
  .stat-num{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:800;line-height:1;color:var(--ebony)}
  .stat-label{font-size:12px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:0.10em;font-weight:600}

  /* ── 3D CONFIGURATOR STYLES ── */
  .configurator-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(92,98,73,0.12);
    margin-bottom: 40px;
  }
  .configurator-header {
    background: linear-gradient(135deg, #5c6249 0%, #848c67 100%);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .configurator-body {
    display: grid;
    grid-template-columns: 1fr 380px;
    min-height: 620px;
  }
  @media(max-width:900px){.configurator-body{grid-template-columns:1fr}}
  .viewer-panel {
    background: linear-gradient(160deg, #f0ede6 0%, #e8e3d8 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    border-right: 1px solid var(--border);
  }
  .controls-panel {
    padding: 24px;
    overflow-y: auto;
    max-height: 620px;
    background: var(--surface);
  }
  .chair-type-card {
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-align: center;
  }
  .chair-type-card:hover {
    border-color: var(--reseda);
    background: rgba(132,140,103,0.06);
    transform: translateY(-2px);
  }
  .chair-type-card.active {
    border-color: var(--reseda);
    background: rgba(132,140,103,0.10);
    box-shadow: 0 0 0 3px rgba(132,140,103,0.18);
  }
  .chair-type-thumb {
    width: 60px;
    height: 50px;
    border-radius: 8px;
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .dim-slider-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }
  .dim-slider-row label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
  }
  .dim-slider-row label span {
    color: var(--reseda);
    font-weight: 700;
  }
  .dim-slider-row input[type=range] {
    -webkit-appearance: none;
    height: 5px;
    border-radius: 3px;
    background: var(--bg3);
    outline: none;
    cursor: pointer;
    width: 100%;
    accent-color: var(--reseda);
  }
  .material-btn {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text2);
    text-align: center;
  }
  .material-btn:hover { border-color: var(--reseda); color: var(--ebony); }
  .material-btn.active { border-color: var(--reseda); background: rgba(132,140,103,0.12); color: var(--ebony); font-weight: 600; }
  .viewer-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    background: rgba(245,242,236,0.9);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    padding: 8px 16px;
    border: 1px solid var(--border2);
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }
  .config-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .price-tag {
    background: linear-gradient(135deg, rgba(92,98,73,0.08), rgba(132,140,103,0.12));
    border: 1px solid rgba(132,140,103,0.25);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
  }
  .finish-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--text2);
  }
  .finish-chip.active {
    border-color: var(--reseda);
    background: rgba(132,140,103,0.12);
    color: var(--ebony);

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CHAIR 3D VIEWER ─────────────────────────────────────────────────────────
function Chair3DViewer({ config }) {
  const mountRef = useRef(null);
  const sceneRef = useRef({});

  const getColorHex = (colorName) => {
    const map = {
      'Matte Black': '#1a1a1a', 'Glossy White': '#f0f0f0', 'Oak Wood': '#c47a35',
      'Gun Metal': '#4a4e6a', 'Rose Gold': '#c87b6e', 'Chrome Silver': '#b8c0cc',
      'Walnut': '#6b3a2a', 'Navy Blue': '#1e3a5f', 'Sage Green': '#7a9e7e',
    };
    return map[colorName] || '#848c67';
  };

  useEffect(() => {
    if (!mountRef.current) return;
    mountRef.current.innerHTML = '';

    const W = mountRef.current.clientWidth || 400;
    const H = 460;

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 1000);
    camera.position.set(2.8, 2.2, 4.5);
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mountRef.current.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xfff8f0, 0.8);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(4, 8, 6);
    dirLight.castShadow = true;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xe8f4f0, 0.5);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xfff0e0, 0.4);
    rimLight.position.set(0, -2, -5);
    scene.add(rimLight);

    // Ground plane (shadow catcher)
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.12 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    const hex = getColorHex(config.color);

    const metalness = config.material === 'Stainless Steel' ? 0.85 : config.material === 'Aluminum' ? 0.6 : 0.3;
    const roughness = config.finish === 'Glossy' ? 0.1 : config.finish === 'Matte' ? 0.85 : 0.45;

    const frameMat = new THREE.MeshStandardMaterial({ color: hex, metalness, roughness });

    const cushionColor = config.cushionColor || '#c8b89a';
    const cushionMat = new THREE.MeshStandardMaterial({
      color: cushionColor, metalness: 0.0, roughness: 0.95,
    });

    const chairGroup = new THREE.Group();

    // Scale from cm to scene units
    const L = config.length / 60;
    const W2 = config.width / 60;
    const H2 = config.height / 60;
    const legH = config.legHeight / 60;

    const buildChair = (type) => {
      const parts = [];
      const chairW = W2 * 0.9;
      const chairD = L * 0.85;
      const legThick = 0.055;

      if (type === 'dining') {
        // Seat
        const seatGeo = new THREE.BoxGeometry(chairW, 0.08, chairD);
        const seat = new THREE.Mesh(seatGeo, cushionMat);
        seat.position.y = legH;
        seat.castShadow = true;
        parts.push(seat);

        // Seat cushion round edges (simulated with slightly smaller rounded box)
        const seatFrame = new THREE.Mesh(new THREE.BoxGeometry(chairW + 0.02, 0.06, chairD + 0.02), frameMat);
        seatFrame.position.y = legH - 0.01;
        seatFrame.castShadow = true;
        parts.push(seatFrame);

        // Backrest
        const backH = H2 * 0.45;
        const backGeo = new THREE.BoxGeometry(chairW, backH, 0.07);
        const back = new THREE.Mesh(backGeo, cushionMat);
        back.position.set(0, legH + 0.08 + backH / 2, -chairD / 2 + 0.04);
        back.castShadow = true;
        parts.push(back);

        const backFrame = new THREE.Mesh(new THREE.BoxGeometry(chairW + 0.02, backH + 0.03, 0.05), frameMat);
        backFrame.position.set(0, legH + 0.08 + backH / 2, -chairD / 2 + 0.02);
        parts.push(backFrame);

        // 4 legs
        [[chairW/2 - legThick, -chairD/2 + legThick], [-chairW/2 + legThick, -chairD/2 + legThick],
         [chairW/2 - legThick, chairD/2 - legThick], [-chairW/2 + legThick, chairD/2 - legThick]].forEach(([x, z]) => {
          const leg = new THREE.Mesh(new THREE.BoxGeometry(legThick, legH, legThick), frameMat);
          leg.position.set(x, legH / 2, z);
          leg.castShadow = true;
          parts.push(leg);
        });

        // Cross bar front
        const bar = new THREE.Mesh(new THREE.BoxGeometry(chairW - 0.08, 0.035, 0.035), frameMat);
        bar.position.set(0, legH * 0.4, chairD / 2 - legThick);
        parts.push(bar);

      } else if (type === 'accent') {
        // Bucket-style accent chair
        const seatGeo = new THREE.CylinderGeometry(chairW * 0.52, chairW * 0.48, 0.1, 16);
        const seat = new THREE.Mesh(seatGeo, cushionMat);
        seat.position.y = legH;
        seat.castShadow = true;
        parts.push(seat);

        // Rounded back
        const points = [];
        for (let i = 0; i <= 10; i++) {
          const t = i / 10;
          points.push(new THREE.Vector2(chairW * 0.5 * (1 - t * 0.2), t * H2 * 0.5));
        }
        const backShape = new THREE.LatheGeometry(points, 24, Math.PI * 0.6, Math.PI * 1.4);
        const back = new THREE.Mesh(backShape, cushionMat);
        back.position.set(0, legH + 0.05, 0);
        back.castShadow = true;
        parts.push(back);

        // 4 angled legs
        [[0.85, 1], [-0.85, 1], [0.85, -1], [-0.85, -1]].forEach(([xs, zs]) => {
          const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, legH * 1.1, 8), frameMat);
          leg.position.set(xs * chairW * 0.38, legH * 0.5, zs * chairW * 0.38);
          leg.rotation.z = xs > 0 ? -0.15 : 0.15;
          leg.rotation.x = zs > 0 ? 0.15 : -0.15;
          leg.castShadow = true;
          parts.push(leg);
        });

      } else if (type === 'lounge') {
        // Wide low lounge chair
        const sw = chairW * 1.3;
        const sd = chairD * 1.2;
        const seatGeo = new THREE.BoxGeometry(sw, 0.12, sd);
        const seat = new THREE.Mesh(seatGeo, cushionMat);
        seat.position.y = legH * 0.6;
        seat.castShadow = true;
        parts.push(seat);

        // Low back
        const backH = H2 * 0.28;
        const backGeo = new THREE.BoxGeometry(sw, backH, 0.1);
        const back = new THREE.Mesh(backGeo, cushionMat);
        back.rotation.x = -0.25;
        back.position.set(0, legH * 0.6 + 0.12 + backH * 0.4, -sd / 2 + 0.05);
        back.castShadow = true;
        parts.push(back);

        // Armrests
        [-1, 1].forEach(side => {
          const arm = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.07, sd * 0.8), frameMat);
          arm.position.set(side * sw / 2, legH * 0.6 + 0.12 + 0.035, -sd * 0.1);
          arm.castShadow = true;
          parts.push(arm);
        });

        // Platform base
        const base = new THREE.Mesh(new THREE.BoxGeometry(sw + 0.08, legH * 0.6, sd + 0.08), frameMat);
        base.position.y = legH * 0.3;
        base.castShadow = true;
        parts.push(base);

      } else if (type === 'barstool') {
        // Tall bar stool
        const barLegH = legH * 1.7;
        const seatGeo = new THREE.CylinderGeometry(chairW * 0.46, chairW * 0.44, 0.08, 16);
        const seat = new THREE.Mesh(seatGeo, cushionMat);
        seat.position.y = barLegH;
        seat.castShadow = true;
        parts.push(seat);

        // Footrest ring
        const footRingGeo = new THREE.TorusGeometry(chairW * 0.32, 0.025, 8, 24);
        const footRing = new THREE.Mesh(footRingGeo, frameMat);
        footRing.rotation.x = Math.PI / 2;
        footRing.position.y = barLegH * 0.38;
        footRing.castShadow = true;
        parts.push(footRing);

        // 4 legs
        for (let i = 0; i < 4; i++) {
          const angle = (i / 4) * Math.PI * 2;
          const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.018, barLegH, 8), frameMat);
          leg.position.set(Math.cos(angle) * chairW * 0.33, barLegH / 2, Math.sin(angle) * chairW * 0.33);
          leg.castShadow = true;
          parts.push(leg);
        }

        // Backrest simple
        const backH = H2 * 0.3;
        const back = new THREE.Mesh(new THREE.CylinderGeometry(chairW * 0.44, chairW * 0.44, 0.06, 16, 1, true, Math.PI * 0.1, Math.PI * 0.8), cushionMat);
        back.position.set(0, barLegH + 0.08 + backH * 0.3, 0);
        back.castShadow = true;
        parts.push(back);
      }

      return parts;
    };

    const parts = buildChair(config.type);
    parts.forEach(p => chairGroup.add(p));
    scene.add(chairGroup);

    // Center the chair
    const box = new THREE.Box3().setFromObject(chairGroup);
    const center = box.getCenter(new THREE.Vector3());
    chairGroup.position.sub(center);
    chairGroup.position.y += box.getSize(new THREE.Vector3()).y / 2;

    // Mouse rotation
    let isDragging = false;
    let prevX = 0;
    let rotY = 0;
    let autoRotate = true;

    const onMouseDown = (e) => { isDragging = true; autoRotate = false; prevX = e.clientX || e.touches?.[0]?.clientX; };
    const onMouseMove = (e) => {
      if (!isDragging) return;
      const x = e.clientX || e.touches?.[0]?.clientX;
      rotY += (x - prevX) * 0.01;
      prevX = x;
    };
    const onMouseUp = () => { isDragging = false; };

    renderer.domElement.addEventListener('mousedown', onMouseDown);
    renderer.domElement.addEventListener('touchstart', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('touchmove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    window.addEventListener('touchend', onMouseUp);

    let animId;
    const animate = () => {
      animId = requestAnimationFrame(animate);
      if (autoRotate) rotY += 0.005;
      chairGroup.rotation.y = rotY;
      renderer.render(scene, camera);
    };
    animate();

    sceneRef.current = { animId, renderer, scene };
    return () => {
      cancelAnimationFrame(animId);
      renderer.dispose();
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      window.removeEventListener('touchmove', onMouseMove);
      window.removeEventListener('touchend', onMouseUp);
    };
  }, [config]);

  return (
    <div ref={mountRef} style={{ width: '100%', height: '460px', borderRadius: 16, overflow: 'hidden', cursor: 'grab' }} />
  );
}

  );
}

function CostEstimationStep({ onNext, onBack, data }) {
  const [hasOwnMaterial, setHasOwnMaterial] = useState(false);
  const [costs, setCosts] = useState(null);
  const [loading, setLoading] = useState(true);
  const calc = useCallback((ownMat) => {
    setLoading(true);
    setTimeout(() => {
      const { length=120, width=60, height=75 } = data.dimensions||{};
      const rates = { 'Steel':85, 'Aluminum':210, 'Stainless Steel':320 };
      const finishes = { 'Matte Black':1.0, 'Glossy White':1.15, 'Wooden Finish':1.25, 'Gun Metal':1.1, 'Rose Gold':1.3, 'Chrome Silver':1.35 };
      const surfaceArea = 2*(length*width+width*height+length*height)/10000;
      const weightKg = surfaceArea*0.2*(data.material==='Aluminum'?2.7:7.8);
      const rate = rates[data.material]||85;
      const finish = finishes[data.color]||1.0;
      let materialCost = Math.round(weightKg*rate*finish);
      const cuttingCost = Math.round(800+(length*width*height)/10000*50);
      const fabricationCost = Math.round(materialCost*0.20);
      const wasteCost = Math.round(materialCost*(0.07+Math.random()*0.08));
      let featureCost = 0;
      if (data.features?.storage) featureCost += 1200;
      if (data.features?.drawers) featureCost += 800;
      if (data.features?.adjustableHeight) featureCost += 600;
      if (ownMat) materialCost = Math.round(materialCost*0.12);
      const total = materialCost+cuttingCost+fabricationCost+wasteCost+featureCost;
      setCosts({ materialCost, cuttingCost, fabricationCost, wasteCost, featureCost, total, weightKg:Math.round(weightKg*10)/10 });
      setLoading(false);
    }, 600);
  }, [data]);
  useEffect(() => { calc(hasOwnMaterial); }, [hasOwnMaterial]);
  const fmt = n => `₹${Math.round(n).toLocaleString('en-IN')}`;
  const rows = costs ? [
    { label:'🏗️ Material Cost', desc:`${data.material} · ${data.color}`, val:costs.materialCost, color:'#7c5cfc' },
    { label:'✂️ Cutting Cost', desc:'CNC plasma/laser cutting', val:costs.cuttingCost, color:'#5b8af7' },
    { label:'🔧 Fabrication Cost', desc:'Welding, grinding, assembly', val:costs.fabricationCost, color:'#38d9a9' },
    { label:'♻️ Material Waste', desc:'Off-cuts & scrap estimation', val:costs.wasteCost, color:'#f5c842' },
  ] : [];
  if (costs?.featureCost>0) rows.push({ label:'⚙️ Feature Add-ons', desc:'Storage / Drawers / Height adjust', val:costs.featureCost, color:'#ff7eb3' });
  return (
    <div className="container" style={{ paddingTop:120, paddingBottom:80 }}>
      <StepProgress current={4} total={7} />
      <div style={{ marginTop:32, maxWidth:700, margin:'32px auto 0' }}>
        <SectionHeader tag="Step 5 of 7" title="Cost Breakdown" sub="Transparent, itemized pricing. No hidden charges." />
        <div className={`toggle-wrap ${hasOwnMaterial?'on':''}`} style={{ marginBottom:32, padding:'20px 24px' }} onClick={() => setHasOwnMaterial(v=>!v)}>
          <div><div style={{ fontWeight:700, fontSize:16 }}>🏭 I have my own material</div><div style={{ fontSize:13, color:'var(--text2)', marginTop:3 }}>{hasOwnMaterial?'Material cost reduced':'Toggle to reduce material cost'}</div></div>
          <div className={`toggle ${hasOwnMaterial?'on':''}`} />
        </div>
        {loading ? (
          <div style={{ textAlign:'center', padding:60 }}><div className="spinner" style={{ margin:'0 auto 20px' }} /><p style={{ color:'var(--text2)' }}>Calculating costs...</p></div>
        ) : (
          <div className="animate-fadeIn">
            <div className="glass" style={{ padding:8, marginBottom:24 }}>
              {rows.map((r,i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'18px 20px', borderBottom:i<rows.length-1?'1px solid var(--border)':'none' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ width:4, height:40, borderRadius:2, background:r.color }} />
                    <div><div style={{ fontWeight:600, fontSize:15 }}>{r.label}</div><div style={{ fontSize:12, color:'var(--text3)', marginTop:2 }}>{r.desc}</div></div>
                  </div>
                  <div style={{ fontWeight:700, fontSize:18, color:r.color }}>{fmt(r.val)}</div>
                </div>
              ))}
            </div>
            <div style={{ padding:28, background:'linear-gradient(135deg,rgba(124,92,252,0.15),rgba(91,138,247,0.15))', border:'1px solid rgba(124,92,252,0.4)', borderRadius:20, display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:40 }}>
              <div><div style={{ fontWeight:800, fontSize:20 }}>Total Cost</div>{hasOwnMaterial&&<div style={{ fontSize:13, color:'var(--accent3)', marginTop:4 }}>✓ Own material discount applied</div>}</div>
              <div className="gradient-text" style={{ fontFamily:"'Playfair Display',serif", fontSize:'clamp(28px,4vw,42px)', fontWeight:800 }}>{fmt(costs?.total)}</div>
            </div>
            <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
              <button className="btn-secondary" onClick={onBack}>← Back</button>
              <button className="btn-primary" onClick={() => onNext({ costs, hasOwnMaterial })}>Optimize Material Usage →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function OptimizationStep({ onNext, onBack, data }) {
  const [loading, setLoading] = useState(true);
  const [result, setResult] = useState(null);
  const [loadMsg, setLoadMsg] = useState('Loading nesting algorithm...');
  useEffect(() => {
    const msgs = ['Loading nesting algorithm...','Analyzing sheet dimensions...','Running bin-packing optimization...','Calculating cutting paths...','Optimization complete ✦'];
    let i = 0;
    const interval = setInterval(() => {
      i++;
      if (i < msgs.length) setLoadMsg(msgs[i]);
      else {
        clearInterval(interval);
        const { length=120, width=60, height=75 } = data.dimensions||{};
        const wasteBefore = Math.round(15+Math.random()*12);
        const wasteAfter = Math.round(wasteBefore*0.62);
        const saved = wasteBefore-wasteAfter;
        const savedCost = Math.round((data.costs?.wasteCost||500)*(saved/wasteBefore));
        const sheets = Math.ceil(2*(length*width+width*height+length*height)/20000);
        setResult({ wasteBefore, wasteAfter, saved, savedCost, sheets:Math.max(1,sheets), piecesPerSheet:Math.round(20000/(length*width)*0.85), sheetSize:'240 × 120 cm' });
        setLoading(false);
      }
    }, 700);
    return () => clearInterval(interval);
  }, []);
  const renderNestGrid = (filled, total, cols) => {
    const cells = Array.from({ length:total }, (_,i) => i<filled);
    return <div className="nest-grid" style={{ gridTemplateColumns:`repeat(${cols},1fr)` }}>{cells.map((f,i) => <div key={i} className={`nest-cell ${f?'filled':'empty'}`} />)}</div>;
  };
  return (
    <div className="container" style={{ paddingTop:120, paddingBottom:80 }}>
      <StepProgress current={5} total={7} />
      <div style={{ marginTop:32, maxWidth:800, margin:'32px auto 0' }}>
        <SectionHeader tag="Step 6 of 7" title="Material Optimization" sub="AI-powered sheet nesting reduces waste and saves money." />
        {loading ? (
          <div style={{ textAlign:'center', padding:'80px 0' }}><div className="spinner" style={{ margin:'0 auto 24px' }} /><p className="animate-pulse" style={{ color:'var(--accent)', fontWeight:600, fontSize:18 }}>{loadMsg}</p></div>
        ) : (
          <div className="animate-fadeIn">
            <div className="grid-3" style={{ marginBottom:32 }}>
              {[{ icon:'♻️', label:'Waste Before', val:`${result.wasteBefore}%`, color:'#ff5757', sub:'Without optimization' }, { icon:'✅', label:'Waste After', val:`${result.wasteAfter}%`, color:'#38d9a9', sub:'With AI nesting' }, { icon:'💰', label:'Cost Saved', val:`₹${result.savedCost.toLocaleString('en-IN')}`, color:'#f5c842', sub:'Material savings' }].map((s,i) => (
                <div key={i} style={{ padding:28, background:'var(--surface)', border:`1px solid ${s.color}33`, borderRadius:20, textAlign:'center' }}>
                  <div style={{ fontSize:32, marginBottom:8 }}>{s.icon}</div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:32, fontWeight:800, color:s.color }}>{s.val}</div>
                  <div style={{ fontWeight:600, marginTop:4 }}>{s.label}</div>
                  <div style={{ fontSize:12, color:'var(--text3)', marginTop:4 }}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:12, justifyContent:'center', marginTop:24 }}>
              <button className="btn-secondary" onClick={onBack}>← Back</button>
              <button className="btn-primary" onClick={() => onNext({ optimization:result })}>View Final Summary →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function FinalOutputStep({ data, onReset }) {
  const fmt = n => `₹${Math.round(n||0).toLocaleString('en-IN')}`;
  const design = data.selectedDesign;
  const opt = data.optimization;
  return (
    <div className="container" style={{ paddingTop:120, paddingBottom:80 }}>
      <StepProgress current={6} total={7} />
      <div style={{ marginTop:32, maxWidth:840, margin:'32px auto 0' }}>
        <div style={{ textAlign:'center', marginBottom:48 }}>
          <div style={{ fontSize:64, marginBottom:16 }}>🎉</div>
          <span className="badge badge-green" style={{ marginBottom:16 }}>✦ Design Complete</span>
          <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:'clamp(28px,4vw,48px)', fontWeight:800, marginBottom:12 }}>Your <span className="gradient-text">{design?.name||'Custom Design'}</span> is Ready</h1>
          <p style={{ color:'var(--text2)', fontSize:17 }}>Here's your complete manufacturing summary</p>
        </div>
        <div className="grid-2" style={{ marginBottom:24, gap:16 }}>
          <div className="glass" style={{ padding:24 }}>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--text2)', marginBottom:16, textTransform:'uppercase', letterSpacing:'0.05em' }}>📐 Specifications</div>
            {[['Length',`${data.dimensions?.length} cm`],['Width',`${data.dimensions?.width} cm`],['Height',`${data.dimensions?.height} cm`],['Material',data.material],['Finish',data.color]].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--border)', fontSize:14 }}>
                <span style={{ color:'var(--text2)' }}>{k}</span><span style={{ fontWeight:600 }}>{v}</span>
              </div>
            ))}
          </div>
          <div className="glass" style={{ padding:24 }}>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--text2)', marginBottom:16, textTransform:'uppercase', letterSpacing:'0.05em' }}>💰 Cost Summary</div>
            {[['Material',fmt(data.costs?.materialCost),'#7c5cfc'],['Cutting',fmt(data.costs?.cuttingCost),'#5b8af7'],['Fabrication',fmt(data.costs?.fabricationCost),'#38d9a9'],['Waste',fmt(data.costs?.wasteCost),'#f5c842']].map(([k,v,c]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--border)', fontSize:14 }}>
                <span style={{ color:'var(--text2)' }}>{k}</span><span style={{ fontWeight:600, color:c }}>{v}</span>
              </div>
            ))}
            <div style={{ display:'flex', justifyContent:'space-between', padding:'12px 0' }}>
              <span style={{ fontWeight:700 }}>Total</span>
              <span className="gradient-text" style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:800 }}>{fmt(data.costs?.total)}</span>
            </div>
          </div>
        </div>
        {opt && (
          <div style={{ padding:24, background:'linear-gradient(135deg,rgba(56,217,169,0.1),rgba(56,217,169,0.05))', border:'1px solid rgba(56,217,169,0.3)', borderRadius:16, display:'flex', gap:16, alignItems:'center', marginBottom:40 }}>
            <span style={{ fontSize:36 }}>⚡</span>
            <div><div style={{ fontWeight:700, fontSize:16, color:'#38d9a9' }}>Waste reduced by {opt.saved}% — ₹{opt.savedCost.toLocaleString('en-IN')} saved</div><div style={{ fontSize:14, color:'var(--text2)', marginTop:4 }}>Optimized for {opt.sheets} sheet(s) of {opt.sheetSize}.</div></div>
          </div>
        )}
        <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
          <button className="btn-secondary" onClick={onReset}>🔄 Start New Design</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('landing');
  const [step, setStep] = useState(0);
  const [designData, setDesignData] = useState({});
  const [toast, setToast] = useState(null);

  const showToast = (message, type='success') => setToast({ message, type });

  const startDesign = () => { setPage('design'); setStep(0); setDesignData({}); window.scrollTo({ top:0, behavior:'smooth' }); };
  const reset = () => { setPage('landing'); setStep(0); setDesignData({}); window.scrollTo({ top:0, behavior:'smooth' }); };
  const nextStep = (newData={}) => { setDesignData(prev => ({ ...prev,...newData })); setStep(s => s+1); window.scrollTo({ top:0, behavior:'smooth' }); showToast('Step complete! Moving forward ✦'); };
  const prevStep = () => { setStep(s => Math.max(0,s-1)); window.scrollTo({ top:0, behavior:'smooth' }); };

  const stepNames = ['Category','Customize','AI Design','Refine','Costs','Optimize','Summary'];

  return (
    <div>
      <Navbar step={step} onReset={reset} />
      {page==='landing' ? (
        <Landing onStart={startDesign} />
      ) : (
        <>
          <div style={{ position:'fixed', top:70, left:0, right:0, zIndex:90, background:'rgba(9,9,15,0.95)', backdropFilter:'blur(10px)', borderBottom:'1px solid var(--border)', padding:'12px 0' }}>
            <div className="container">
              <div style={{ display:'flex', alignItems:'center', gap:8, overflowX:'auto' }}>
                {stepNames.map((name,i) => (
                  <React.Fragment key={i}>
                    <div style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 10px', borderRadius:8, background:i===step?'rgba(124,92,252,0.15)':'transparent', flexShrink:0 }}>
                      <div style={{ width:20, height:20, borderRadius:'50%', background:i<step?'var(--accent3)':i===step?'var(--accent)':'var(--surface2)', border:`2px solid ${i<step?'var(--accent3)':i===step?'var(--accent)':'var(--border2)'}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:700, color:i<=step?'white':'var(--text3)' }}>{i<step?'✓':i+1}</div>
                      <span style={{ fontSize:12, fontWeight:i===step?700:400, color:i===step?'var(--text)':'var(--text3)', whiteSpace:'nowrap' }}>{name}</span>
                    </div>
                    {i<stepNames.length-1 && <div style={{ height:1, width:20, background:i<step?'var(--accent3)':'var(--border)', flexShrink:0 }} />}
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>
          <div style={{ paddingTop:48 }}>
            {step===0 && <CategoryStep onNext={nextStep} data={designData} />}
            {step===1 && <CustomizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step===2 && <AIGenerationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step===3 && <DesignCustomizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step===4 && <CostEstimationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step===5 && <OptimizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step===6 && <FinalOutputStep data={designData} onReset={reset} />}
          </div>
        </>
      )}
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
