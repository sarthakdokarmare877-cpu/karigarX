<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MetalCraft AI — Custom Metal Furniture Design</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090f;
    --bg2: #0f0f1a;
    --bg3: #131325;
    --surface: #1a1a2e;
    --surface2: #20203a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0ff;
    --text2: #a0a0c0;
    --text3: #6060a0;
    --accent: #7c5cfc;
    --accent2: #5b8af7;
    --accent3: #38d9a9;
    --gold: #f5c842;
    --danger: #ff5757;
    --glow: rgba(124, 92, 252, 0.3);
    --glow2: rgba(91, 138, 247, 0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px var(--glow); }
    50% { box-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow2); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .animate-fadeUp { animation: fadeUp 0.6s ease forwards; }
  .animate-fadeIn { animation: fadeIn 0.4s ease forwards; }
  .animate-float { animation: float 4s ease-in-out infinite; }
  .animate-spin { animation: spin 1s linear infinite; }
  .animate-pulse { animation: pulse 2s ease infinite; }
  .animate-glow { animation: glow-pulse 3s ease infinite; }

  /* Staggered animations */
  .stagger-1 { animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards; }
  .stagger-2 { animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards; }
  .stagger-3 { animation-delay: 0.3s; opacity: 0; animation-fill-mode: forwards; }
  .stagger-4 { animation-delay: 0.4s; opacity: 0; animation-fill-mode: forwards; }
  .stagger-5 { animation-delay: 0.5s; opacity: 0; animation-fill-mode: forwards; }
  .stagger-6 { animation-delay: 0.6s; opacity: 0; animation-fill-mode: forwards; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 80px 0; }

  /* Glass card */
  .glass {
    background: rgba(26, 26, 46, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border2);
    border-radius: 20px;
  }

  /* Gradient text */
  .gradient-text {
    background: linear-gradient(135deg, #7c5cfc, #5b8af7, #38d9a9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .gradient-text-gold {
    background: linear-gradient(135deg, #f5c842, #ff9a3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    background: linear-gradient(135deg, #7c5cfc, #5b8af7);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px var(--glow);
    text-decoration: none;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--glow);
    background: linear-gradient(135deg, #8d6dfd, #6c9bf8);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-secondary:hover {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    color: var(--text2);
    border: none;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }

  /* Inputs */
  .input-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
  }
  .input-field::placeholder { color: var(--text3); }

  select.input-field option { background: var(--surface); }

  /* Labels */
  .label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, transparent, rgba(124,92,252,0.3), transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    border-color: rgba(124, 92, 252, 0.4);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,92,252,0.2);
  }
  .card.selected {
    border-color: var(--accent);
    background: rgba(124, 92, 252, 0.08);
    box-shadow: 0 0 0 2px var(--accent), 0 20px 60px var(--glow);
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-purple { background: rgba(124,92,252,0.15); color: #a78bfa; border: 1px solid rgba(124,92,252,0.3); }
  .badge-blue { background: rgba(91,138,247,0.15); color: #7eb3fb; border: 1px solid rgba(91,138,247,0.3); }
  .badge-green { background: rgba(56,217,169,0.15); color: #6ee7c7; border: 1px solid rgba(56,217,169,0.3); }
  .badge-gold { background: rgba(245,200,66,0.15); color: #fcd34d; border: 1px solid rgba(245,200,66,0.3); }

  /* Progress bar */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideIn 0.3s ease forwards;
    max-width: 380px;
  }
  .toast.success { border-color: rgba(56,217,169,0.4); }
  .toast.error { border-color: rgba(255,87,87,0.4); }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
    margin: 24px 0;
  }

  /* Cost row */
  .cost-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .cost-row:last-child { border-bottom: none; }

  /* Chip selector */
  .chip {
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid var(--border2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--text2);
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,0.08); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(124,92,252,0.15); }

  /* Navbar */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 0;
    background: rgba(9, 9, 15, 0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  /* Hero background */
  .hero-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .hero-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
  }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

  @media (max-width: 768px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-auto { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .hide-mobile { display: none; }
  }
  @media (max-width: 480px) {
    .grid-2, .grid-4 { grid-template-columns: 1fr; }
  }

  /* Nesting grid */
  .nest-grid {
    display: grid;
    gap: 3px;
    padding: 16px;
    background: var(--bg);
    border-radius: 12px;
  }
  .nest-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    border: 1px solid rgba(124,92,252,0.3);
  }
  .nest-cell.filled { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .nest-cell.empty { background: rgba(255,87,87,0.1); border-color: rgba(255,87,87,0.2); }

  /* Loading spinner */
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Feature toggle */
  .toggle-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .toggle-wrap:hover { border-color: var(--border2); }
  .toggle-wrap.on { border-color: rgba(56,217,169,0.4); background: rgba(56,217,169,0.05); }
  .toggle {
    width: 40px;
    height: 22px;
    background: var(--surface2);
    border-radius: 11px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent3); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(18px); }

  /* Step indicator */
  .step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border2);
    transition: all 0.3s;
  }
  .step-dot.active {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
    transform: scale(1.3);
  }
  .step-dot.done {
    background: var(--accent3);
    border-color: var(--accent3);
  }

  /* Color swatch */
  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .color-swatch.selected {
    border-color: white;
    transform: scale(1.2);
    box-shadow: 0 0 0 2px var(--accent);
  }

  /* Hero stats */
  .stat-item {
    text-align: center;
    padding: 20px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1;
  }
  .stat-label {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── CONSTANTS ──────────────────────────────────────────────────────────────

const CATEGORIES = [
  { id: 'table', name: 'Coffee Table', icon: '🪑', desc: 'Side & center tables', color: '#7c5cfc' },
  { id: 'chair', name: 'Chair', icon: '🪑', desc: 'Accent & dining chairs', color: '#5b8af7' },
  { id: 'sofa', name: 'Sofa Frame', icon: '🛋️', desc: 'Living room seating', color: '#38d9a9' },
  { id: 'bed', name: 'Bed Frame', icon: '🛏️', desc: 'Steel bed structures', color: '#f5c842' },
  { id: 'wardrobe', name: 'Wardrobe', icon: '🚪', desc: 'Custom wardrobes', color: '#ff7eb3' },
  { id: 'shelf', name: 'Wall Shelf', icon: '📚', desc: 'Floating & bracket shelves', color: '#7c5cfc' },
  { id: 'cabinet', name: 'Cabinet', icon: '🗄️', desc: 'Storage solutions', color: '#5b8af7' },
  { id: 'office-desk', name: 'Office Desk', icon: '🖥️', desc: 'Ergonomic workstations', color: '#38d9a9' },
  { id: 'tv-unit', name: 'TV Unit', icon: '📺', desc: 'Entertainment consoles', color: '#f5c842' },
  { id: 'lamp-stand', name: 'Lamp Stand', icon: '💡', desc: 'Night & floor lamps', color: '#ff7eb3' },
  { id: 'dining-table', name: 'Dining Table', icon: '🍽️', desc: 'Dining sets & tables', color: '#7c5cfc' },
  { id: 'study-table', name: 'Study Table', icon: '📖', desc: 'Student & home study', color: '#5b8af7' },
];

const SUBTYPES = {
  table: ['Modern', 'Minimal', 'Industrial', 'Premium', 'Rustic'],
  chair: ['Dining', 'Accent', 'Office', 'Bar Stool', 'Lounge'],
  sofa: ['2-Seater', '3-Seater', 'L-Shape', 'Loveseat', 'Sectional'],
  bed: ['Single', 'Double', 'Queen', 'King', 'Bunk Bed'],
  default: ['Modern', 'Minimal', 'Industrial', 'Premium', 'Classic'],
};

const MATERIALS = ['Steel', 'Aluminum', 'Stainless Steel'];
const COLORS = [
  { name: 'Matte Black', hex: '#1a1a1a' },
  { name: 'Glossy White', hex: '#f5f5f5' },
  { name: 'Wooden Finish', hex: '#a0672a' },
  { name: 'Gun Metal', hex: '#4a4a5a' },
  { name: 'Rose Gold', hex: '#b87066' },
  { name: 'Chrome Silver', hex: '#c0c0c0' },
];
const THEMES = ['Modern', 'Minimal', 'Industrial', 'Premium'];
const FEATURES = [
  { id: 'storage', label: 'Built-in Storage', icon: '📦', cost: '+ ₹1,200' },
  { id: 'drawers', label: 'Drawers', icon: '🗄️', cost: '+ ₹800' },
  { id: 'adjustableHeight', label: 'Adjustable Height', icon: '↕️', cost: '+ ₹600' },
];

// Mock AI designs
const MOCK_DESIGNS = {
  table: [
    { id: 1, name: 'Apex Industrial', style: 'Industrial', description: 'Raw steel hairpin legs with a reclaimed solid top. Bold, utilitarian, statement piece for lofts.', rating: 4.8, complexity: 'Medium', accent: '#7c5cfc' },
    { id: 2, name: 'Lumina Minimal', style: 'Minimal', description: 'Ultra-thin steel profile, brushed finish. Less is brilliantly more — perfection in restraint.', rating: 4.9, complexity: 'Low', accent: '#38d9a9' },
    { id: 3, name: 'Forma Premium', style: 'Premium', description: 'Geometric welded frame, mirror-polished stainless. Designed for boardrooms and luxury homes.', rating: 4.7, complexity: 'High', accent: '#f5c842' },
    { id: 4, name: 'Urban Modern', style: 'Modern', description: 'Angular powder-coated steel, clean rectangular silhouette. The contemporary home staple.', rating: 4.6, complexity: 'Medium', accent: '#5b8af7' },
  ],
};

const getDesigns = (category) => {
  const key = category?.toLowerCase().replace(/\s/g, '');
  return (MOCK_DESIGNS[key] || MOCK_DESIGNS.table).map(d => ({
    ...d,
    accent: d.accent,
  }));
};

// ─── TOAST ──────────────────────────────────────────────────────────────────
function Toast({ message, type = 'success', onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);

  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  return (
    <div className={`toast ${type}`}>
      <span style={{ fontSize: 20 }}>{icons[type]}</span>
      <span style={{ color: 'var(--text)', fontSize: 15, fontWeight: 500 }}>{message}</span>
    </div>
  );
}

// ─── NAVBAR ──────────────────────────────────────────────────────────────────
function Navbar({ step, onReset }) {
  return (
    <nav className="navbar">
      <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }} onClick={onReset} className="btn-ghost" role="button">
          <div style={{ width: 32, height: 32, borderRadius: 8, background: 'linear-gradient(135deg, #7c5cfc, #5b8af7)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>⚙</div>
          <span style={{ fontWeight: 700, fontSize: 18, letterSpacing: '-0.02em' }}>MetalCraft <span className="gradient-text">AI</span></span>
        </div>

        <div className="hide-mobile" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {['Explore', 'Customize', 'Estimate', 'Optimize'].map((s, i) => (
            <span key={s} style={{
              padding: '6px 14px',
              borderRadius: 8,
              fontSize: 13,
              fontWeight: 500,
              color: step > i ? 'var(--accent)' : 'var(--text3)',
              background: step > i ? 'rgba(124,92,252,0.1)' : 'transparent',
            }}>{s}</span>
          ))}
        </div>

        <button className="btn-secondary" style={{ padding: '8px 18px', fontSize: 13 }} onClick={onReset}>
          🔄 New Design
        </button>
      </div>
    </nav>
  );
}

// ─── STEP PROGRESS ────────────────────────────────────────────────────────────
function StepProgress({ current, total }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '12px 0' }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} className={`step-dot ${i < current ? 'done' : i === current ? 'active' : ''}`} />
      ))}
    </div>
  );
}

// ─── SECTION HEADER ──────────────────────────────────────────────────────────
function SectionHeader({ tag, title, sub }) {
  return (
    <div style={{ textAlign: 'center', marginBottom: 48 }}>
      {tag && <span className="badge badge-purple" style={{ marginBottom: 16 }}>{tag}</span>}
      <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(28px, 4vw, 44px)', fontWeight: 800, lineHeight: 1.15, marginBottom: 14 }}>{title}</h2>
      {sub && <p style={{ color: 'var(--text2)', fontSize: 17, maxWidth: 520, margin: '0 auto', lineHeight: 1.7 }}>{sub}</p>}
    </div>
  );
}

// ─── LANDING PAGE ────────────────────────────────────────────────────────────
function Landing({ onStart }) {
  const [hoveredCat, setHoveredCat] = useState(null);

  return (
    <div>
      {/* Hero */}
      <section style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', position: 'relative', paddingTop: 100, paddingBottom: 80 }}>
        <div className="hero-bg">

// ─── STEP 1: CATEGORY SELECTION ──────────────────────────────────────────────
function CategoryStep({ onNext, data }) {
  const [selected, setSelected] = useState(data.category || null);
  const [subtype, setSubtype] = useState(data.subtype || null);

  const subtypes = selected ? (SUBTYPES[selected] || SUBTYPES.default) : [];

  const handleNext = () => {
    if (!selected || !subtype) return;
    onNext({ category: selected, subtype });
  };

  const selCat = CATEGORIES.find(c => c.id === selected);

  return (
    <div className="container" style={{ paddingTop: 120, paddingBottom: 80 }}>
      <StepProgress current={0} total={7} />
      <div style={{ marginTop: 32 }}>
        <SectionHeader tag="Step 1 of 7" title="Choose Your Furniture" sub="Select the type of furniture you want to design. We'll guide you through every step." />

        <div className="grid-auto" style={{ marginBottom: 40 }}>
          {CATEGORIES.map((cat) => (
            <div
              key={cat.id}
              className={`card ${selected === cat.id ? 'selected' : ''}`}
              style={{ textAlign: 'center', padding: '24px 16px' }}
              onClick={() => { setSelected(cat.id); setSubtype(null); }}
            >
              <div style={{
                width: 56,
                height: 56,
                borderRadius: 14,
                background: `linear-gradient(135deg, ${cat.color}22, ${cat.color}44)`,
                border: `1px solid ${cat.color}44`,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: 24,
                margin: '0 auto 12px',
              }}>
                {cat.icon}
              </div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{cat.name}</div>
              {selected === cat.id && <div style={{ marginTop: 8 }}><span className="badge badge-purple">✓ Selected</span></div>}
            </div>
          ))}
        </div>

        {selected && (
          <div className="animate-fadeIn" style={{ background: 'var(--surface)', border: '1px solid var(--border2)', borderRadius: 24, padding: 32, marginBottom: 40 }}>
            <h3 style={{ fontWeight: 700, fontSize: 18, marginBottom: 6 }}>
              {selCat?.icon} {selCat?.name} — Choose Style
            </h3>
            <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 24 }}>Pick the style that matches your vision</p>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12 }}>
              {subtypes.map(s => (
                <button key={s} className={`chip ${subtype === s ? 'active' : ''}`} onClick={() => setSubtype(s)}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{ textAlign: 'center' }}>
          <button
            className="btn-primary"
            onClick={handleNext}
            disabled={!selected || !subtype}
            style={{ opacity: (!selected || !subtype) ? 0.4 : 1, cursor: (!selected || !subtype) ? 'not-allowed' : 'pointer' }}
          >
            Continue to Customization →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── STEP 2: CUSTOMIZATION FORM ──────────────────────────────────────────────

    length: data.dimensions?.length || 120,

  const toggleFeature = (id) => set('features', { ...form.features, [id]: !form.features[id] });

  const handleNext = () => {
    onNext({
      dimensions: { length: +form.length, width: +form.width, height: +form.height },
      material: form.material,
      color: form.color,
      theme: form.theme,

// ─── STEP 3: AI DESIGN GENERATION ────────────────────────────────────────────
function AIGenerationStep({ onNext, onBack, data }) {
  const [loading, setLoading] = useState(true);
  const [designs, setDesigns] = useState([]);
  const [selected, setSelected] = useState(null);
  const [loadMsg, setLoadMsg] = useState('Initializing AI model...');

  useEffect(() => {
    const msgs = [
      'Initializing AI model...',
      'Analyzing your preferences...',
      'Generating design variants...',
      'Optimizing proportions...',
      'Finalizing designs ✦',
    ];
    let i = 0;
    const interval = setInterval(() => {
      i++;
      if (i < msgs.length) setLoadMsg(msgs[i]);
      else {
        clearInterval(interval);
        setDesigns(getDesigns(data.category));
        setLoading(false);

    return () => clearInterval(interval);

// ─── STEP 5: COST ESTIMATION ─────────────────────────────────────────────────
function CostEstimationStep({ onNext, onBack, data }) {
  const [hasOwnMaterial, setHasOwnMaterial] = useState(false);
  const [costs, setCosts] = useState(null);
  const [loading, setLoading] = useState(true);

  const calc = useCallback((ownMat) => {
    setLoading(true);
    setTimeout(() => {
      const { length = 120, width = 60, height = 75 } = data.dimensions || {};
      const rates = { 'Steel': 85, 'Aluminum': 210, 'Stainless Steel': 320 };
      const finishes = { 'Matte Black': 1.0, 'Glossy White': 1.15, 'Wooden Finish': 1.25, 'Gun Metal': 1.1, 'Rose Gold': 1.3, 'Chrome Silver': 1.35 };

      const surfaceArea = 2 * (length * width + width * height + length * height) / 10000;
      const weightKg = surfaceArea * 0.2 * (data.material === 'Aluminum' ? 2.7 : 7.8);
      const rate = rates[data.material] || 85;
      const finish = finishes[data.color] || 1.0;

      let materialCost = Math.round(weightKg * rate * finish);
      const cuttingCost = Math.round(800 + (length * width * height) / 10000 * 50);
      const fabricationCost = Math.round(materialCost * 0.20);
      const wasteCost = Math.round(materialCost * (0.07 + Math.random() * 0.08));

      let featureCost = 0;
      if (data.features?.storage) featureCost += 1200;
      if (data.features?.drawers) featureCost += 800;
      if (data.features?.adjustableHeight) featureCost += 600;

      if (ownMat) materialCost = Math.round(materialCost * 0.12);

      const total = materialCost + cuttingCost + fabricationCost + wasteCost + featureCost;
      setCosts({ materialCost, cuttingCost, fabricationCost, wasteCost, featureCost, total, weightKg: Math.round(weightKg * 10) / 10 });
      setLoading(false);
    }, 600);
  }, [data]);

  useEffect(() => { calc(hasOwnMaterial); }, [hasOwnMaterial]);

  const fmt = n => `₹${Math.round(n).toLocaleString('en-IN')}`;

  const rows = costs ? [
    { label: '🏗️ Material Cost', desc: `${data.material} · ${data.color}`, val: costs.materialCost, color: '#7c5cfc' },
    { label: '✂️ Cutting Cost', desc: 'CNC plasma/laser cutting', val: costs.cuttingCost, color: '#5b8af7' },
    { label: '🔧 Fabrication Cost', desc: 'Welding, grinding, assembly', val: costs.fabricationCost, color: '#38d9a9' },
    { label: '♻️ Material Waste', desc: 'Off-cuts & scrap estimation', val: costs.wasteCost, color: '#f5c842' },
  ] : [];

  if (costs?.featureCost > 0) {
    rows.push({ label: '⚙️ Feature Add-ons', desc: 'Storage / Drawers / Height adjust', val: costs.featureCost, color: '#ff7eb3' });
  }

  return (
    <div className="container" style={{ paddingTop: 120, paddingBottom: 80 }}>
      <StepProgress current={4} total={7} />
      <div style={{ marginTop: 32, maxWidth: 700, margin: '32px auto 0' }}>
        <SectionHeader tag="Step 5 of 7" title="Cost Breakdown" sub="Transparent, itemized pricing. No hidden charges." />

        {/* Own material toggle */}
        <div
          className={`toggle-wrap ${hasOwnMaterial ? 'on' : ''}`}
          style={{ marginBottom: 32, padding: '20px 24px' }}
          onClick={() => setHasOwnMaterial(v => !v)}
        >
          <div>
            <div style={{ fontWeight: 700, fontSize: 16 }}>🏭 I have my own material</div>
            <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 3 }}>
              {hasOwnMaterial ? 'Material cost reduced — only processing fees apply' : 'Toggle to reduce material cost significantly'}
            </div>
          </div>
          <div className={`toggle ${hasOwnMaterial ? 'on' : ''}`} />
        </div>

        {loading ? (
          <div style={{ textAlign: 'center', padding: 60 }}>
            <div className="spinner" style={{ margin: '0 auto 20px' }} />
            <p style={{ color: 'var(--text2)' }}>Calculating costs...</p>
          </div>
        ) : (
          <div className="animate-fadeIn">
            {/* Weight info */}
            <div style={{ padding: '12px 20px', background: 'rgba(91,138,247,0.1)', border: '1px solid rgba(91,138,247,0.3)', borderRadius: 12, marginBottom: 24, fontSize: 14, color: 'var(--text2)' }}>
              Estimated weight: <strong style={{ color: 'var(--text)' }}>{costs?.weightKg} kg</strong> · Material: <strong style={{ color: 'var(--text)' }}>{data.material}</strong>
            </div>

            {/* Cost rows */}
            <div className="glass" style={{ padding: 8, marginBottom: 24 }}>
              {rows.map((r, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '18px 20px', borderBottom: i < rows.length - 1 ? '1px solid var(--border)' : 'none' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 4, height: 40, borderRadius: 2, background: r.color }} />
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 15 }}>{r.label}</div>
                      <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 2 }}>{r.desc}</div>
                    </div>
                  </div>
                  <div style={{ fontWeight: 700, fontSize: 18, color: r.color }}>{fmt(r.val)}</div>
                </div>
              ))}
            </div>

            {/* Total */}
            <div style={{
              padding: 28,
              background: 'linear-gradient(135deg, rgba(124,92,252,0.15), rgba(91,138,247,0.15))',
              border: '1px solid rgba(124,92,252,0.4)',
              borderRadius: 20,
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              marginBottom: 40,
              boxShadow: '0 0 40px rgba(124,92,252,0.2)',
            }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 20 }}>Total Cost</div>
                {hasOwnMaterial && <div style={{ fontSize: 13, color: 'var(--accent3)', marginTop: 4 }}>✓ Own material discount applied</div>}
              </div>
              <div className="gradient-text" style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(28px, 4vw, 42px)', fontWeight: 800 }}>
                {fmt(costs?.total)}
              </div>
            </div>

            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <button className="btn-secondary" onClick={onBack}>← Back</button>
              <button className="btn-primary" onClick={() => onNext({ costs, hasOwnMaterial })}>
                Optimize Material Usage →
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── STEP 6: OPTIMIZATION ────────────────────────────────────────────────────
function OptimizationStep({ onNext, onBack, data }) {
  const [loading, setLoading] = useState(true);
  const [result, setResult] = useState(null);
  const [loadMsg, setLoadMsg] = useState('Loading nesting algorithm...');

  useEffect(() => {
    const msgs = [
      'Loading nesting algorithm...',
      'Analyzing sheet dimensions...',
      'Running bin-packing optimization...',
      'Calculating cutting paths...',
      'Optimization complete ✦',
    ];
    let i = 0;
    const interval = setInterval(() => {
      i++;
      if (i < msgs.length) setLoadMsg(msgs[i]);
      else {
        clearInterval(interval);
        // Compute optimization
        const { length = 120, width = 60, height = 75 } = data.dimensions || {};
        const wasteBefore = Math.round(15 + Math.random() * 12);
        const wasteAfter = Math.round(wasteBefore * 0.62);
        const saved = wasteBefore - wasteAfter;
        const savedCost = Math.round((data.costs?.wasteCost || 500) * (saved / wasteBefore));
        const sheets = Math.ceil(2 * (length * width + width * height + length * height) / 20000);

        setResult({
          wasteBefore,
          wasteAfter,
          saved,
          savedCost,
          sheets: Math.max(1, sheets),
          piecesPerSheet: Math.round(20000 / (length * width) * 0.85),
          sheetSize: '240 × 120 cm',
        });
        setLoading(false);
      }
    }, 700);
    return () => clearInterval(interval);
  }, []);

  const renderNestGrid = (filled, total, cols) => {
    const cells = Array.from({ length: total }, (_, i) => i < filled);
    return (
      <div className="nest-grid" style={{ gridTemplateColumns: `repeat(${cols}, 1fr)` }}>
        {cells.map((f, i) => <div key={i} className={`nest-cell ${f ? 'filled' : 'empty'}`} />)}
      </div>
    );
  };

  return (
    <div className="container" style={{ paddingTop: 120, paddingBottom: 80 }}>
      <StepProgress current={5} total={7} />
      <div style={{ marginTop: 32, maxWidth: 800, margin: '32px auto 0' }}>
        <SectionHeader tag="Step 6 of 7" title="Material Optimization" sub="AI-powered sheet nesting reduces waste and saves you money." />

        {loading ? (
          <div style={{ textAlign: 'center', padding: '80px 0' }}>
            <div className="spinner" style={{ margin: '0 auto 24px' }} />
            <p className="animate-pulse" style={{ color: 'var(--accent)', fontWeight: 600, fontSize: 18 }}>{loadMsg}</p>
            <div style={{ marginTop: 24, maxWidth: 300, margin: '24px auto 0' }}>
              <div className="progress-bar">
                <div className="progress-fill animate-pulse" style={{ width: '70%' }} />
              </div>
            </div>
          </div>
        ) : (
          <div className="animate-fadeIn">
            {/* Big stats */}
            <div className="grid-3" style={{ marginBottom: 32 }}>
              {[
                { icon: '♻️', label: 'Waste Before', val: `${result.wasteBefore}%`, color: '#ff5757', sub: 'Without optimization' },
                { icon: '✅', label: 'Waste After', val: `${result.wasteAfter}%`, color: '#38d9a9', sub: 'With AI nesting' },
                { icon: '💰', label: 'Cost Saved', val: `₹${result.savedCost.toLocaleString('en-IN')}`, color: '#f5c842', sub: 'Material savings' },
              ].map((s, i) => (
                <div key={i} style={{ padding: 28, background: 'var(--surface)', border: `1px solid ${s.color}33`, borderRadius: 20, textAlign: 'center' }}>
                  <div style={{ fontSize: 32, marginBottom: 8 }}>{s.icon}</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 32, fontWeight: 800, color: s.color }}>{s.val}</div>
                  <div style={{ fontWeight: 600, marginTop: 4 }}>{s.label}</div>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4 }}>{s.sub}</div>
                </div>
              ))}
            </div>

            {/* Waste reduction banner */}
            <div style={{
              padding: 24,
              background: 'linear-gradient(135deg, rgba(56,217,169,0.1), rgba(56,217,169,0.05))',
              border: '1px solid rgba(56,217,169,0.3)',
              borderRadius: 16,
              display: 'flex',
              alignItems: 'center',
              gap: 16,
              marginBottom: 24,
            }}>
              <span style={{ fontSize: 36 }}>🎯</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 17, color: '#38d9a9' }}>Waste reduced by {result.saved}%</div>
                <div style={{ fontSize: 14, color: 'var(--text2)', marginTop: 4 }}>Optimized cutting layout generated for {result.sheets} sheet(s) of {result.sheetSize} standard metal sheets.</div>
              </div>
            </div>

            {/* Nesting visualization */}
            <div className="glass" style={{ padding: 28, marginBottom: 32 }}>
              <h3 style={{ fontWeight: 700, marginBottom: 6 }}>🔲 Sheet Nesting Layout</h3>
              <p style={{ color: 'var(--text2)', fontSize: 13, marginBottom: 20 }}>
                Visual representation of piece placement on {result.sheetSize} standard sheet
              </p>

              <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', flexWrap: 'wrap' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 8 }}>Standard Sheet ({result.sheetSize})</div>
                  {renderNestGrid(
                    Math.round(result.piecesPerSheet * (100 - result.wasteAfter) / 100),
                    result.piecesPerSheet,
                    Math.ceil(Math.sqrt(result.piecesPerSheet))
                  )}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, marginBottom: 12, color: 'var(--text2)' }}>Legend</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                    {[
                      { color: 'linear-gradient(135deg, var(--accent), var(--accent2))', label: 'Furniture piece' },
                      { color: 'rgba(255,87,87,0.1)', label: 'Material waste / offcut', border: '1px solid rgba(255,87,87,0.3)' },
                    ].map((l, i) => (
                      <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                        <div style={{ width: 24, height: 24, borderRadius: 4, background: l.color, border: l.border, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, color: 'var(--text2)' }}>{l.label}</span>
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: 24, padding: 16, background: 'var(--bg)', borderRadius: 12 }}>
                    <div style={{ fontSize: 13, color: 'var(--text2)', lineHeight: 2 }}>
                      <div>Sheets required: <strong style={{ color: 'var(--text)' }}>{result.sheets}</strong></div>
                      <div>Sheet utilization: <strong style={{ color: '#38d9a9' }}>{100 - result.wasteAfter}%</strong></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div style={{ display: 'flex', gap: 12, justifyContent: 'center' }}>
              <button className="btn-secondary" onClick={onBack}>← Back</button>
              <button className="btn-primary" onClick={() => onNext({ optimization: result })}>
                View Final Summary →
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

              ['Cutting', fmt(data.costs?.cuttingCost), '#5b8af7'],
              ['Fabrication', fmt(data.costs?.fabricationCost), '#38d9a9'],
              ['Waste', fmt(data.costs?.wasteCost), '#f5c842'],
              ...(data.costs?.featureCost > 0 ? [['Features', fmt(data.costs?.featureCost), '#ff7eb3']] : []),
            ].map(([k, v, c]) => (
              <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid var(--border)', fontSize: 14 }}>
                <span style={{ color: 'var(--text2)' }}>{k}</span>
                <span style={{ fontWeight: 600, color: c }}>{v}</span>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 0', marginTop: 4 }}>
              <span style={{ fontWeight: 700 }}>Total</span>
              <span className="gradient-text" style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 800 }}>{fmt(data.costs?.total)}</span>
            </div>
          </div>
        </div>

        {/* Optimization result */}
        {opt && (
          <div style={{
            padding: 24,
            background: 'linear-gradient(135deg, rgba(56,217,169,0.1), rgba(56,217,169,0.05))',
            border: '1px solid rgba(56,217,169,0.3)',
            borderRadius: 16,
            display: 'flex',
            gap: 16,
            alignItems: 'center',
            marginBottom: 40,
            flexWrap: 'wrap',
          }}>
            <span style={{ fontSize: 36 }}>⚡</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 16, color: '#38d9a9' }}>
                Waste reduced by {opt.saved}% — {fmt(opt.savedCost)} saved in material costs
              </div>
              <div style={{ fontSize: 14, color: 'var(--text2)', marginTop: 4 }}>
                Optimized cutting layout generated for {opt.sheets} sheet(s) of {opt.sheetSize} standard sheets.
              </div>
            </div>
          </div>
        )}

        {/* Actions */}
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn-primary" onClick={handleDownload} style={{ minWidth: 200 }}>
            {downloading ? '⏳ Generating...' : '⬇️ Download Summary'}
          </button>
          <button className="btn-secondary" onClick={onReset}>
            🔄 Start New Design
          </button>
        </div>

        <div style={{ textAlign: 'center', marginTop: 32, padding: 20, background: 'var(--surface)', borderRadius: 16, border: '1px solid var(--border)' }}>
          <p style={{ fontSize: 13, color: 'var(--text3)' }}>
            ✦ This summary is AI-generated for estimation purposes. Final quote subject to on-site measurements and material availability.
            Production time: <strong style={{ color: 'var(--text2)' }}>5–10 working days</strong>.
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('landing'); // landing, design
  const [step, setStep] = useState(0);
  const [designData, setDesignData] = useState({});
  const [toast, setToast] = useState(null);

  const showToast = (message, type = 'success') => {
    setToast({ message, type });
  };

  const startDesign = () => {
    setPage('design');
    setStep(0);
    setDesignData({});
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const reset = () => {
    setPage('landing');
    setStep(0);
    setDesignData({});
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const nextStep = (newData = {}) => {
    setDesignData(prev => ({ ...prev, ...newData }));
    setStep(s => s + 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast('Step complete! Moving forward ✦');
  };

  const prevStep = () => {
    setStep(s => Math.max(0, s - 1));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const stepNames = ['Category', 'Customize', 'AI Design', 'Refine', 'Costs', 'Optimize', 'Summary'];

  return (
    <div>
      <Navbar step={step} onReset={reset} />

      {page === 'landing' ? (
        <Landing onStart={startDesign} />
      ) : (
        <>
          {/* Step header bar */}
          <div style={{
            position: 'fixed',
            top: 70,
            left: 0,
            right: 0,
            zIndex: 90,
            background: 'rgba(9,9,15,0.95)',
            backdropFilter: 'blur(10px)',
            borderBottom: '1px solid var(--border)',
            padding: '12px 0',
          }}>
            <div className="container">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, overflowX: 'auto' }}>
                {stepNames.map((name, i) => (
                  <React.Fragment key={i}>
                    <div style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: 6,
                      padding: '4px 10px',
                      borderRadius: 8,
                      background: i === step ? 'rgba(124,92,252,0.15)' : 'transparent',
                      flexShrink: 0,
                    }}>
                      <div style={{
                        width: 20,
                        height: 20,
                        borderRadius: '50%',
                        background: i < step ? 'var(--accent3)' : i === step ? 'var(--accent)' : 'var(--surface2)',
                        border: `2px solid ${i < step ? 'var(--accent3)' : i === step ? 'var(--accent)' : 'var(--border2)'}`,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        fontSize: 10,
                        fontWeight: 700,
                        color: i <= step ? 'white' : 'var(--text3)',
                      }}>
                        {i < step ? '✓' : i + 1}
                      </div>
                      <span style={{ fontSize: 12, fontWeight: i === step ? 700 : 400, color: i === step ? 'var(--text)' : 'var(--text3)', whiteSpace: 'nowrap' }}>
                        {name}
                      </span>
                    </div>
                    {i < stepNames.length - 1 && (
                      <div style={{ height: 1, width: 20, background: i < step ? 'var(--accent3)' : 'var(--border)', flexShrink: 0 }} />
                    )}
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>

          <div style={{ paddingTop: 48 }}>
            {step === 0 && <CategoryStep onNext={nextStep} data={designData} />}
            {step === 1 && <CustomizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step === 2 && <AIGenerationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step === 3 && <DesignCustomizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step === 4 && <CostEstimationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step === 5 && <OptimizationStep onNext={nextStep} onBack={prevStep} data={designData} />}
            {step === 6 && <FinalOutputStep data={designData} onReset={reset} />}
          </div>
        </>
      )}

      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
